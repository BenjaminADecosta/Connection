<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Growing Together" />
  <meta name="theme-color" content="#E8D9B8" />
  <title>Growing Together</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,400;1,400;1,600&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --parchment: #EDE0C4;
      --card-bg: #F8F0DC;
      --card-back: #2C4233;
      --card-back-2: #243829;
      --card-back-3: #1C2E21;
      --ink: #1E1208;
      --ink-mid: #5C3D20;
      --ink-light: #8B6040;
      --ink-faint: #B09878;
      --gold: #B8943F;
      --border: rgba(30,18,8,0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { min-height: 100%; }

    body {
      min-height: 100vh;
      background-color: var(--parchment);
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(120,80,20,0.022) 3px, rgba(120,80,20,0.022) 4px),
        repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(120,80,20,0.012) 3px, rgba(120,80,20,0.012) 4px);
      font-family: 'Raleway', sans-serif;
      color: var(--ink);
      overflow-x: hidden;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 45%, rgba(80,40,10,0.14) 100%);
      pointer-events: none; z-index: 0;
    }

    #app {
      position: relative; z-index: 1;
      max-width: 420px; margin: 0 auto;
      padding: 52px 28px 72px;
      display: flex; flex-direction: column; align-items: center;
    }

    /* Header */
    #header { text-align: center; width: 100%; margin-bottom: 36px; }

    .eyebrow {
      font-weight: 300; font-size: 9px;
      letter-spacing: 0.55em; text-transform: uppercase;
      color: var(--ink-faint); margin-bottom: 12px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 30px; font-weight: 400;
      color: var(--ink); margin-bottom: 18px; line-height: 1.2;
    }

    .ornament {
      display: flex; align-items: center; gap: 14px;
      justify-content: center; margin-bottom: 22px;
    }
    .orn-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--ink-faint)); }
    .orn-line.r { background: linear-gradient(90deg, var(--ink-faint), transparent); }
    .orn-sym { color: var(--gold); font-size: 13px; }

    #quote-wrap { min-height: 68px; transition: opacity 0.6s ease, transform 0.6s ease; }
    #quote-wrap.out { opacity: 0; transform: translateY(5px); }
    #quote-wrap.in  { opacity: 1; transform: translateY(0); }

    #quote-text {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 15px;
      line-height: 1.75; color: var(--ink-mid); margin-bottom: 7px;
    }
    #quote-ref {
      font-size: 9px; letter-spacing: 0.32em;
      text-transform: uppercase; color: var(--ink-faint);
    }

    /* Card area */
    #card-area { width: 100%; display: flex; flex-direction: column; align-items: center; }

    /* Deck */
    #deck {
      position: relative; width: 272px; height: 352px;
      margin-bottom: 26px; cursor: pointer;
      transition: transform 0.3s ease, opacity 0.3s ease, height 0.3s ease, margin 0.3s ease;
    }
    #deck.hide { opacity: 0; transform: translateY(-12px); pointer-events: none; height: 0; margin-bottom: 0; overflow: hidden; }

    .dl {
      position: absolute; width: 272px; height: 352px;
      border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.22);
    }
    .dl:nth-child(1) { background: var(--card-back-3); transform: rotate(-4.5deg) translate(-7px, 5px); opacity: 0.65; }
    .dl:nth-child(2) { background: var(--card-back-2); transform: rotate(2.5deg) translate(5px, 3px); opacity: 0.82; }
    .dl.top {
      background: var(--card-back);
      transform: rotate(0);
      display: flex; align-items: center; justify-content: center;
    }

    .card-back-panel {
      width: 228px; height: 296px;
      border: 1px solid rgba(255,255,255,0.12); border-radius: 7px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
    }

    .cross { position: relative; width: 26px; height: 26px; }
    .cross::before, .cross::after {
      content: ''; position: absolute;
      background: rgba(255,255,255,0.45); border-radius: 1px;
    }
    .cross::before { width: 3px; height: 26px; left: 50%; transform: translateX(-50%); }
    .cross::after  { width: 18px; height: 3px; top: 7px; left: 50%; transform: translateX(-50%); }

    .back-label {
      font-size: 7px; letter-spacing: 0.45em;
      text-transform: uppercase; color: rgba(255,255,255,0.28);
    }

    #deck-count {
      font-size: 10px; letter-spacing: 0.22em;
      color: var(--ink-faint); text-transform: uppercase;
      margin-bottom: 22px; transition: opacity 0.3s, max-height 0.3s;
      overflow: hidden; max-height: 30px;
    }
    #deck-count.hide { opacity: 0; max-height: 0; margin-bottom: 0; }

    /* Drawn card */
    #drawn-card {
      display: none; opacity: 0;
      width: 272px; height: 352px;
      perspective: 1400px; margin-bottom: 24px;
      transition: opacity 0.35s ease;
    }
    #drawn-card.show { display: block; }
    #drawn-card.visible { opacity: 1; }

    #card-inner {
      width: 100%; height: 100%; position: relative;
      transform-style: preserve-3d;
      transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #card-inner.flipped { transform: rotateY(180deg); }

    .cf {
      position: absolute; width: 100%; height: 100%;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      border-radius: 12px; box-shadow: 0 8px 36px rgba(0,0,0,0.16);
    }

    #cf-back {
      background: var(--card-back);
      display: flex; align-items: center; justify-content: center;
    }

    #cf-front {
      background: var(--card-bg);
      transform: rotateY(180deg);
      padding: 34px 28px 28px;
      display: flex; flex-direction: column;
      border: 1px solid rgba(180,140,60,0.18);
      background-image: repeating-linear-gradient(
        transparent, transparent 27px,
        rgba(120,80,20,0.055) 27px, rgba(120,80,20,0.055) 28px
      );
      overflow: hidden; position: relative;
    }

    #cf-front::before {
      content: '❧';
      position: absolute; top: 12px; right: 16px;
      font-size: 18px; color: var(--gold); opacity: 0.28;
    }

    #card-cat {
      display: flex; align-items: center; gap: 8px;
      font-size: 8px; letter-spacing: 0.48em;
      text-transform: uppercase; margin-bottom: 22px;
    }
    .cat-pip { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

    #card-q {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 20px;
      line-height: 1.7; color: var(--ink);
      flex: 1; display: flex; align-items: center;
    }

    .card-rule { width: 36px; height: 1px; background: var(--border); margin: 18px 0 12px; }
    .card-orn  { font-size: 14px; color: var(--gold); opacity: 0.45; }

    /* Action buttons */
    #action-buttons { display: none; gap: 12px; width: 272px; }
    #action-buttons.show { display: flex; }

    .act-btn {
      flex: 1; font-family: 'Raleway', sans-serif; font-weight: 400;
      font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase;
      padding: 13px 0; border-radius: 2px; cursor: pointer;
      transition: all 0.2s; background: transparent;
    }
    #keep-btn   { border: 1px solid rgba(50,110,70,0.55); color: #346248; }
    #remove-btn { border: 1px solid rgba(160,55,35,0.5);  color: #9B3D28; }

    /* Divider */
    .divider { width: 100%; height: 1px; background: var(--border); margin: 36px 0 28px; }

    /* Legend */
    #legend { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin-bottom: 14px; }
    .li { display: flex; align-items: center; gap: 7px; }
    .li-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .li-name { font-size: 10px; letter-spacing: 0.1em; color: var(--ink-mid); }
    .li-count { font-size: 10px; color: var(--ink-faint); }

    #restore-btn {
      display: none;
      font-family: 'Raleway', sans-serif; font-size: 9px;
      letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--ink-faint); background: transparent;
      border: 1px solid var(--border); padding: 9px 22px;
      cursor: pointer; border-radius: 2px; margin-top: 12px;
    }

    /* History */
    #history { width: 100%; margin-top: 26px; }
    #history-label {
      font-size: 9px; letter-spacing: 0.38em; text-transform: uppercase;
      color: var(--ink-faint); text-align: center; margin-bottom: 16px;
    }
    .hi {
      padding: 13px 16px; margin-bottom: 8px;
      border-left: 2px solid rgba(120,80,20,0.15);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 14px;
      color: var(--ink-mid); line-height: 1.6;
    }
    .hi-cat {
      font-family: 'Raleway', sans-serif; font-style: normal;
      font-size: 8px; letter-spacing: 0.3em; text-transform: uppercase;
      margin-right: 8px; opacity: 0.65;
    }
  </style>
</head>
<body>
<div id="app">

  <div id="header">
    <div class="eyebrow">A weekly practice</div>
    <h1>Growing Together</h1>
    <div class="ornament">
      <div class="orn-line"></div>
      <span class="orn-sym">✦</span>
      <div class="orn-line r"></div>
    </div>
    <div id="quote-wrap" class="in">
      <p id="quote-text"></p>
      <div style="margin-top:7px"><span id="quote-ref"></span></div>
    </div>
  </div>

  <div id="card-area">
    <div id="deck">
      <div class="dl"></div>
      <div class="dl"></div>
      <div class="dl top">
        <div class="card-back-panel">
          <div class="cross"></div>
          <div class="back-label">Draw a question</div>
        </div>
      </div>
    </div>
    <span id="deck-count"></span>

    <div id="drawn-card">
      <div id="card-inner">
        <div class="cf" id="cf-back">
          <div class="card-back-panel"><div class="cross"></div></div>
        </div>
        <div class="cf" id="cf-front">
          <div id="card-cat">
            <span class="cat-pip" id="cat-pip"></span>
            <span id="cat-label"></span>
          </div>
          <p id="card-q"></p>
          <div class="card-rule"></div>
          <div class="card-orn">✦</div>
        </div>
      </div>
    </div>

    <div id="action-buttons">
      <button class="act-btn" id="keep-btn">Keep</button>
      <button class="act-btn" id="remove-btn">Remove</button>
    </div>
  </div>

  <div class="divider"></div>
  <div id="legend"></div>
  <button id="restore-btn">Restore All Questions</button>
  <div id="history"></div>
</div>

<script>
const QUOTES = [
  { text: "Two are better than one... if either of them falls, one can help the other up.", ref: "Ecclesiastes 4:9–10" },
  { text: "Trust in the Lord with all your heart and lean not on your own understanding.", ref: "Proverbs 3:5" },
  { text: "Iron sharpens iron, and one man sharpens another.", ref: "Proverbs 27:17" },
  { text: "Bear one another's burdens, and so fulfill the law of Christ.", ref: "Galatians 6:2" },
  { text: "Love is patient, love is kind. It does not envy, it does not boast.", ref: "1 Corinthians 13:4" },
  { text: "For I know the plans I have for you, declares the Lord, plans to give you a hope and a future.", ref: "Jeremiah 29:11" },
  { text: "Commit your way to the Lord; trust in him and he will act.", ref: "Psalm 37:5" },
  { text: "Do not be anxious about anything, but in everything by prayer present your requests to God.", ref: "Philippians 4:6" },
];

const ALL_QUESTIONS = [
  { question: "What moment first made your faith feel real to you?", category: "Faith", color: "#8B6F3A" },
  { question: "How do you feel closest to God — worship, prayer, nature, or community?", category: "Faith", color: "#8B6F3A" },
  { question: "How has your relationship with God changed in the last year?", category: "Faith", color: "#8B6F3A" },
  { question: "What's a time God showed up in a way you didn't expect?", category: "Faith", color: "#8B6F3A" },
  { question: "What does worship mean to you beyond just singing?", category: "Faith", color: "#8B6F3A" },
  { question: "If you could ask God one question face to face, what would it be?", category: "Faith", color: "#8B6F3A" },
  { question: "What does the Holy Spirit feel like to you when you sense Him?", category: "Faith", color: "#8B6F3A" },
  { question: "What's a sin you've had to genuinely repent of and felt changed by?", category: "Faith", color: "#8B6F3A" },
  { question: "If you knew that in one year you would die suddenly, would you change anything about the way you are now living? Why?", category: "Faith", color: "#8B6F3A" },

  { question: "What's a fear you've never really said out loud to anyone?", category: "Personal", color: "#3D6B50" },
  { question: "What's something you're genuinely proud of that others might not know?", category: "Personal", color: "#3D6B50" },
  { question: "What does loneliness feel like for you — and what does it actually take for someone to break through that?", category: "Personal", color: "#3D6B50" },
  { question: "What are you most uncertain about in your life right now?", category: "Personal", color: "#3D6B50" },
  { question: "What's a part of yourself you find hardest to accept — and is it something you've ever let someone else fully see?", category: "Personal", color: "#3D6B50" },
  { question: "What do you most want someone to understand about who you are?", category: "Personal", color: "#3D6B50" },
  { question: "What's something small someone did that made you feel deeply cared for that they probably didn't even realize?", category: "Personal", color: "#3D6B50" },
  { question: "How do you know when you need space vs. when you need someone to stay — and have you ever asked for the wrong one?", category: "Personal", color: "#3D6B50" },
  { question: "What do you need from someone when you're going through something hard that most people get wrong when they try to help you?", category: "Personal", color: "#3D6B50" },
  { question: "For what in your life do you feel most grateful?", category: "Personal", color: "#3D6B50" },
  { question: "If you could wake up tomorrow having gained any one quality or ability, what would it be?", category: "Personal", color: "#3D6B50" },
  { question: "What roles do love and affection play in your life?", category: "Personal", color: "#3D6B50" },
  { question: "How close and warm is your family? Do you feel your childhood was happier than most other people's?", category: "Personal", color: "#3D6B50" },
  { question: "How do you feel about your relationship with your mother?", category: "Personal", color: "#3D6B50" },
  { question: "When did you last cry in front of another person? By yourself?", category: "Personal", color: "#3D6B50" },
  { question: "If you were to die this evening with no opportunity to communicate with anyone, what would you most regret not having told someone? Why haven't you told them yet?", category: "Personal", color: "#3D6B50" },
  { question: "Share a personal problem and ask your partner how they might handle it — then ask them to reflect back how you seem to be feeling about it.", category: "Personal", color: "#3D6B50" },

  { question: "What's a line you would never cross, no matter what?", category: "Values", color: "#8A4A32" },
  { question: "What do you believe God is calling you toward right now?", category: "Values", color: "#8A4A32" },
  { question: "What's something the world values that you're learning not to?", category: "Values", color: "#8A4A32" },
  { question: "What do you want people to say about you at the end of your life?", category: "Values", color: "#8A4A32" },
  { question: "What's a conviction you hold that most people around you don't share?", category: "Values", color: "#8A4A32" },
  { question: "How do you want to handle conflict in a relationship?", category: "Values", color: "#8A4A32" },
  { question: "What's something you want to build or create in your lifetime?", category: "Values", color: "#8A4A32" },
  { question: "What do you value most in a friendship?", category: "Values", color: "#8A4A32" },
  { question: "Is there something you've dreamed of doing for a long time? Why haven't you done it?", category: "Values", color: "#8A4A32" },
  { question: "If you were going to become a close friend with your partner, what would be important for them to know about you?", category: "Values", color: "#8A4A32" },

  { question: "What's your favourite memory from childhood?", category: "Light", color: "#7A5E2A" },
  { question: "What's something you're secretly really good at?", category: "Light", color: "#7A5E2A" },
  { question: "What does your perfect day look like from start to finish?", category: "Light", color: "#7A5E2A" },
  { question: "What's something you've always wanted to try but haven't yet?", category: "Light", color: "#7A5E2A" },
  { question: "What's the most spontaneous thing you've ever done?", category: "Light", color: "#7A5E2A" },
  { question: "What's a movie, show, or book that genuinely changed how you see the world?", category: "Light", color: "#7A5E2A" },
  { question: "If you could have dinner with anyone — living, dead, or fictional — who?", category: "Light", color: "#7A5E2A" },
  { question: "What's something small you do that brings you joy that nobody knows about?", category: "Light", color: "#7A5E2A" },
  { question: "What's your go-to comfort meal when you've had a rough day?", category: "Light", color: "#7A5E2A" },
  { question: "What's the best gift you've ever received and why did it mean so much?", category: "Light", color: "#7A5E2A" },
  { question: "Take four minutes and tell your partner your life story in as much detail as possible.", category: "Light", color: "#7A5E2A" },
  { question: "Share an embarrassing moment in your life.", category: "Light", color: "#7A5E2A" },
  { question: "Tell your partner what you like about them — be honest, saying things you might not normally say to someone you've just met.", category: "Light", color: "#7A5E2A" },
];

const CAT_COLORS = { Faith: "#8B6F3A", Personal: "#3D6B50", Values: "#8A4A32", Light: "#7A5E2A" };

let segments = [];
let currentQ = null;
let currentQIndex = null;
let historyList = [];

function loadRemoved() {
  try { return JSON.parse(localStorage.getItem("gt-removed") || "[]"); } catch(_) { return []; }
}
function saveRemoved() {
  try {
    const removed = ALL_QUESTIONS.filter(q => !segments.some(s => s.question === q.question)).map(q => q.question);
    localStorage.setItem("gt-removed", JSON.stringify(removed));
  } catch(_) {}
}
function clearRemoved() { try { localStorage.removeItem("gt-removed"); } catch(_) {} }

function shuffle(qs) {
  const pools = {};
  qs.forEach(q => { if (!pools[q.category]) pools[q.category] = []; pools[q.category].push({...q}); });
  const keys = Object.keys(pools);
  const result = []; let s = 0;
  while (keys.some(k => pools[k]?.length > 0) && s++ < 2000) {
    const avail = keys.filter(k => pools[k]?.length > 0);
    const last = result.length ? result[result.length - 1].category : null;
    const pref = avail.filter(k => k !== last);
    const pool = pref.length ? pref : avail;
    const pick = pool[Math.floor(Math.random() * pool.length)];
    const arr = pools[pick];
    result.push(arr.splice(Math.floor(Math.random() * arr.length), 1)[0]);
  }
  return result;
}

function init() {
  const removed = loadRemoved();
  segments = shuffle(ALL_QUESTIONS.filter(q => !removed.includes(q.question)));
  renderLegend(); updateDeckCount(); updateRestoreBtn();
}

// Quotes
let quoteIdx = 0;
const qWrap = document.getElementById("quote-wrap");
const qText = document.getElementById("quote-text");
const qRef  = document.getElementById("quote-ref");

function showQuote() {
  qText.textContent = `"${QUOTES[quoteIdx].text}"`;
  qRef.textContent  = QUOTES[quoteIdx].ref;
}
showQuote();
setInterval(() => {
  qWrap.className = "out";
  setTimeout(() => { quoteIdx = (quoteIdx + 1) % QUOTES.length; showQuote(); qWrap.className = "in"; }, 650);
}, 15000);

// Elements
const deck       = document.getElementById("deck");
const deckCount  = document.getElementById("deck-count");
const drawnCard  = document.getElementById("drawn-card");
const cardInner  = document.getElementById("card-inner");
const cardQ      = document.getElementById("card-q");
const catPip     = document.getElementById("cat-pip");
const catLabel   = document.getElementById("cat-label");
const actionBtns = document.getElementById("action-buttons");
const restoreBtn = document.getElementById("restore-btn");

function updateDeckCount() {
  deckCount.textContent = segments.length === 0
    ? "No questions remaining"
    : `${segments.length} question${segments.length === 1 ? "" : "s"} remaining`;
}

// Draw
deck.addEventListener("click", draw);

function draw() {
  if (segments.length === 0) return;
  const idx = Math.floor(Math.random() * segments.length);
  currentQ = segments[idx];
  currentQIndex = idx;

  cardQ.textContent = `"${currentQ.question}"`;
  catPip.style.background = currentQ.color;
  catLabel.style.color = currentQ.color;
  catLabel.textContent = currentQ.category;

  deck.classList.add("hide");
  deckCount.classList.add("hide");

  setTimeout(() => {
    drawnCard.classList.add("show");
    requestAnimationFrame(() => {
      drawnCard.classList.add("visible");
      setTimeout(() => {
        cardInner.classList.add("flipped");
        setTimeout(() => { actionBtns.classList.add("show"); }, 700);
      }, 150);
    });
  }, 250);
}

document.getElementById("keep-btn").addEventListener("click", () => {
  addHistory(currentQ);
  returnCard();
});

document.getElementById("remove-btn").addEventListener("click", () => {
  if (currentQIndex === null) return;
  addHistory(currentQ);
  segments.splice(currentQIndex, 1);
  saveRemoved(); renderLegend(); updateRestoreBtn();
  returnCard();
});

function returnCard() {
  actionBtns.classList.remove("show");
  setTimeout(() => { cardInner.classList.remove("flipped"); }, 80);
  setTimeout(() => { drawnCard.classList.remove("visible"); }, 600);
  setTimeout(() => {
    drawnCard.classList.remove("show");
    currentQ = null; currentQIndex = null;
    updateDeckCount();
    deck.classList.remove("hide");
    deckCount.classList.remove("hide");
    if (segments.length === 0) deck.style.pointerEvents = "none";
  }, 950);
}

restoreBtn.addEventListener("click", () => {
  clearRemoved();
  segments = shuffle(ALL_QUESTIONS);
  historyList = [];
  renderHistory();
  deck.style.pointerEvents = "";
  renderLegend(); updateDeckCount(); updateRestoreBtn();
});

function updateRestoreBtn() {
  restoreBtn.style.display = segments.length < ALL_QUESTIONS.length ? "block" : "none";
}

const legendEl = document.getElementById("legend");
function renderLegend() {
  legendEl.innerHTML = "";
  Object.entries(CAT_COLORS).forEach(([cat, color]) => {
    const rem = segments.filter(s => s.category === cat).length;
    const el = document.createElement("div");
    el.className = "li";
    el.innerHTML = `
      <div class="li-dot" style="background:${color};opacity:${rem===0?0.3:1}"></div>
      <span class="li-name" style="opacity:${rem===0?0.45:1}">${cat}</span>
      <span class="li-count">(${rem})</span>`;
    legendEl.appendChild(el);
  });
}

const historyEl = document.getElementById("history");
function addHistory(item) {
  historyList.unshift(item);
  if (historyList.length > 6) historyList.pop();
  renderHistory();
}
function renderHistory() {
  const visible = historyList.slice(1);
  if (!visible.length) { historyEl.innerHTML = ""; return; }
  historyEl.innerHTML = `<div id="history-label">Past Questions</div>` +
    visible.map(h => `<div class="hi" style="border-left-color:${h.color}55">
      <span class="hi-cat" style="color:${h.color}">${h.category}</span>${h.question}
    </div>`).join("");
}

init();
</script>
</body>
</html>
