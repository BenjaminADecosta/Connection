<meta name="theme-color" content="#0d1f10"/>
<title>Growing Together</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=EB+Garamond:ital,wght@0,400;1,400;1,500&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;overflow-x:hidden}
body{background:#0d1f10;font-family:'Raleway',sans-serif;color:#F0E8D5;min-height:100vh}

/* ── Background (fixed) ── */
#bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
#bg::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,#0d1f10 0%,#132e16 38%,#183d1c 68%,#112912 100%);
}
#bg svg{position:absolute;inset:0;width:100%;height:100%}

/* ── Star twinkle ── */
@keyframes twinkle{from{opacity:.08}to{opacity:.30}}

/* ── App shell ── */
#app{
  position:relative;z-index:2;
  max-width:420px;margin:0 auto;
  padding:58px 28px 88px;
  display:flex;flex-direction:column;align-items:center;
}

/* ── Entrance animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fu1{animation:fadeUp 1.1s .0s ease both}
.fu2{animation:fadeUp 1.0s .15s ease both}
.fu3{animation:fadeUp 1.0s .30s ease both}
.fu4{animation:fadeUp 1.0s .50s ease both}

/* ── Header ── */
#header{text-align:center;width:100%;margin-bottom:44px}
.eyebrow{font-weight:300;font-size:9px;letter-spacing:.62em;text-transform:uppercase;color:rgba(201,150,58,.52);margin-bottom:16px}
h1{
  font-family:'Cinzel',serif;font-size:28px;font-weight:400;
  color:#F0E8D5;line-height:1.25;letter-spacing:.1em;
  text-shadow:0 0 60px rgba(201,150,58,.28),0 2px 4px rgba(0,0,0,.5);
  margin-bottom:4px;
}

/* ── Ornament ── */
.ornament{display:flex;align-items:center;gap:14px;justify-content:center;margin:20px 0 24px}
.orn-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(201,150,58,.4))}
.orn-line.r{background:linear-gradient(90deg,rgba(201,150,58,.4),transparent)}

/* ── Quote ── */
#quote-wrap{min-height:88px;transition:opacity .65s ease,transform .65s ease}
#quote-wrap.out{opacity:0;transform:translateY(7px)}
#quote-wrap.in{opacity:1;transform:translateY(0)}
#quote-text{font-family:'EB Garamond',serif;font-style:italic;font-size:15.5px;line-height:1.82;color:rgba(240,232,213,.75);margin-bottom:9px}
#quote-ref{font-size:9px;letter-spacing:.38em;text-transform:uppercase;color:rgba(201,150,58,.52)}

/* ── Card area ── */
#card-area{width:100%;display:flex;flex-direction:column;align-items:center}

/* ── Deck ── */
#deck{
  position:relative;width:272px;height:352px;margin-bottom:28px;cursor:pointer;
  transition:height .35s ease,margin .35s ease,opacity .3s ease;
}
#deck.hide{opacity:0;pointer-events:none;height:0!important;margin-bottom:0;overflow:hidden}
#deck:hover .deck-top{transform:translateY(-7px)!important;box-shadow:0 24px 60px rgba(0,0,0,.78),0 0 40px rgba(201,150,58,.14)!important}
.deck-layer{position:absolute;width:272px;height:352px;border-radius:16px}
.deck-layer:nth-child(1){background:linear-gradient(160deg,#162A19,#0A160B);transform:rotate(-4.5deg) translate(-7px,5px);opacity:.55;box-shadow:0 6px 20px rgba(0,0,0,.55)}
.deck-layer:nth-child(2){background:linear-gradient(160deg,#1E3C23,#162A19);transform:rotate(2.5deg) translate(5px,3px);opacity:.78;box-shadow:0 6px 20px rgba(0,0,0,.5)}
.deck-top{position:absolute;width:272px;height:352px;transition:transform .4s cubic-bezier(.34,1.56,.64,1),box-shadow .4s ease;box-shadow:0 12px 44px rgba(0,0,0,.65),inset 0 1px 0 rgba(201,150,58,.12)}

/* ── Card back ── */
.card-back{
  width:100%;height:100%;
  background:linear-gradient(155deg,#c9b585 0%,#bda872 52%,#c4b07e 100%);
  border-radius:16px;display:flex;align-items:center;justify-content:center;
  border:1px solid rgba(160,110,40,.30);
  box-shadow:0 12px 44px rgba(0,0,0,.55),inset 0 1px 0 rgba(220,180,100,.35);
  position:relative;overflow:hidden;
}
.card-back::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(transparent,transparent 27px,rgba(140,100,40,.05) 27px,rgba(140,100,40,.05) 28px);
  pointer-events:none;
}
.cb-frame{position:absolute;inset:14px;border:1px solid rgba(160,110,40,.25);border-radius:9px;pointer-events:none}
.cb-inner{display:flex;flex-direction:column;align-items:center;gap:20px;position:relative;z-index:1}
.cross-halo{position:absolute;width:100px;height:100px;border-radius:50%;background:radial-gradient(ellipse,rgba(160,110,30,.22) 0%,transparent 70%)}
.back-label{font-family:'Cinzel',serif;font-size:7.5px;letter-spacing:.58em;text-transform:uppercase;color:rgba(240,232,213,.26)}

/* Corners */
.cb-corner{position:absolute;width:16px;height:16px;opacity:.45}
.cb-corner svg{width:100%;height:100%}
.cb-corner.tl{top:22px;left:22px}
.cb-corner.tr{top:22px;right:22px;transform:rotate(90deg)}
.cb-corner.br{bottom:22px;right:22px;transform:rotate(180deg)}
.cb-corner.bl{bottom:22px;left:22px;transform:rotate(270deg)}
.back-label{font-family:'Cinzel',serif;font-size:7.5px;letter-spacing:.58em;text-transform:uppercase;color:rgba(100,65,20,.55)}

/* ── Deck count ── */
#deck-count{
  font-size:10px;letter-spacing:.26em;color:rgba(240,232,213,.22);
  text-transform:uppercase;margin-bottom:24px;
  transition:opacity .3s,max-height .3s,margin .3s;max-height:30px;overflow:hidden;
}
#deck-count.hide{opacity:0;max-height:0;margin-bottom:0}

/* ── Drawn card ── */
#drawn-card{display:none;width:272px;height:352px;perspective:1500px;-webkit-perspective:1500px;margin-bottom:24px;opacity:0;transition:opacity .4s ease}
#drawn-card.show{display:block}
#drawn-card.visible{opacity:1}
#card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;-webkit-transform-style:preserve-3d;transition:transform .9s cubic-bezier(.4,0,.2,1);-webkit-transition:-webkit-transform .9s cubic-bezier(.4,0,.2,1)}
#card-inner.flipped{transform:rotateY(180deg);-webkit-transform:rotateY(180deg)}
.cf{position:absolute;width:100%;height:100%;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:16px;-webkit-transform:translateZ(0)}
#cf-back{-webkit-transform:rotateY(0deg);transform:rotateY(0deg)}
#cf-front{background:#F4EDDB;transform:rotateY(180deg);-webkit-transform:rotateY(180deg);padding:36px 30px 28px;display:flex;flex-direction:column;box-shadow:0 16px 55px rgba(0,0,0,.65),0 0 0 1px rgba(201,150,58,.12);position:relative;overflow:hidden}
.front-frame{position:absolute;inset:10px;border:1px solid rgba(26,58,34,.10);border-radius:8px;pointer-events:none}
#card-cat{display:flex;align-items:center;gap:9px;font-size:8px;letter-spacing:.52em;text-transform:uppercase;margin-bottom:24px;font-weight:500}
.cat-pip{width:5px;height:5px;border-radius:50%;flex-shrink:0}
#card-q{font-family:'EB Garamond',serif;font-style:italic;font-size:20px;line-height:1.76;color:#162219;flex:1;display:flex;align-items:center}
.card-rule{width:32px;height:1px;background:rgba(26,58,34,.18);margin:20px 0 13px}

/* ── Action buttons ── */
#action-buttons{display:none;gap:12px;width:272px;opacity:0;transform:translateY(6px);transition:opacity .3s ease,transform .3s ease}
#action-buttons.show{display:flex;opacity:1;transform:translateY(0)}
.act-btn{flex:1;font-family:'Raleway',sans-serif;font-weight:400;font-size:10px;letter-spacing:.32em;text-transform:uppercase;padding:14px 0;border-radius:3px;cursor:pointer;transition:all .25s ease;background:transparent}
#keep-btn{border:1px solid rgba(80,160,100,.4);color:#72B88A}
#keep-btn:hover{background:rgba(80,160,100,.12);border-color:rgba(80,160,100,.65);box-shadow:0 0 18px rgba(80,160,100,.14)}
#remove-btn{border:1px solid rgba(180,90,60,.38);color:#C0886A}
#remove-btn:hover{background:rgba(180,90,60,.10);border-color:rgba(180,90,60,.58)}

/* ── Divider ── */
.divider{width:100%;margin:44px 0 32px;display:flex;align-items:center;gap:16px}
.div-line{flex:1;height:1px;background:rgba(240,232,213,.07)}

/* ── Legend ── */
#legend{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;margin-bottom:16px}
.li{display:flex;align-items:center;gap:8px}
.li-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.li-name{font-size:10px;letter-spacing:.12em;color:rgba(240,232,213,.55)}
.li-count{font-size:10px;color:rgba(240,232,213,.22)}

#restore-btn{display:none;font-family:'Raleway',sans-serif;font-size:9px;letter-spacing:.32em;text-transform:uppercase;color:rgba(240,232,213,.42);background:transparent;border:1px solid rgba(240,232,213,.1);padding:11px 26px;cursor:pointer;border-radius:2px;margin-top:16px;transition:all .25s}
#restore-btn:hover{border-color:rgba(201,150,58,.38);color:#DFB25A}

/* ── History ── */
#history{width:100%;margin-top:30px}
#history-label{font-size:9px;letter-spacing:.42em;text-transform:uppercase;color:rgba(240,232,213,.22);text-align:center;margin-bottom:18px}

.hi:hover{background:rgba(255,255,255,.04)}
.hi-cat{font-family:'Raleway',sans-serif;font-style:normal;font-size:8px;letter-spacing:.3em;text-transform:uppercase;margin-right:9px;opacity:.65}

          <div id="card-cat">
            <span class="cat-pip" id="cat-pip"></span>
            <span id="cat-label"></span>
          </div>
          <p id="card-q"></p>
          <div class="card-rule"></div>
          <span id="card-cross" style="opacity:.35;display:flex"></span>
        </div>
      </div>
    </div>

    <div id="action-buttons">
      <button class="act-btn" id="keep-btn">Keep</button>
      <button class="act-btn" id="remove-btn">Remove</button>
    </div>

  </div>

  <div class="divider">
    <div class="div-line"></div>
    <span id="div-cross" style="opacity:.25;display:flex"></span>
    <div class="div-line"></div>
  </div>

  <div id="legend"></div>
  <button id="restore-btn">Restore All Questions</button>
  <div id="history"></div>

</div>

<script>
/* ══════════════════ DATA ══════════════════ */
const QUOTES=[
  {text:"Two are better than one… if either of them falls, one can help the other up.",ref:"Ecclesiastes 4:9–10"},
  {text:"Trust in the Lord with all your heart and lean not on your own understanding.",ref:"Proverbs 3:5"},
  {text:"Iron sharpens iron, and one man sharpens another.",ref:"Proverbs 27:17"},
  {text:"Bear one another's burdens, and so fulfill the law of Christ.",ref:"Galatians 6:2"},
  {text:"Love is patient, love is kind. It does not envy, it does not boast.",ref:"1 Corinthians 13:4"},
  {text:"For I know the plans I have for you, declares the Lord, plans to give you a hope and a future.",ref:"Jeremiah 29:11"},
  {text:"Commit your way to the Lord; trust in him and he will act.",ref:"Psalm 37:5"},
  {text:"Do not be anxious about anything, but in everything by prayer present your requests to God.",ref:"Philippians 4:6"},
];
const ALL=[
  {q:"What moment first made your faith feel real to you?",c:"Faith"},
  {q:"How do you feel closest to God — worship, prayer, nature, or community?",c:"Faith"},
  {q:"How has your relationship with God changed in the last year?",c:"Faith"},
  {q:"What's a time God showed up in a way you didn't expect?",c:"Faith"},
  {q:"What does worship mean to you beyond just singing?",c:"Faith"},
  {q:"If you could ask God one question face to face, what would it be?",c:"Faith"},
  {q:"What does the Holy Spirit feel like to you when you sense Him?",c:"Faith"},
  {q:"What's a sin you've had to genuinely repent of and felt changed by?",c:"Faith"},
  {q:"If you knew that in one year you would die suddenly, would you change anything about the way you are now living? Why?",c:"Faith"},
  {q:"What's a fear you've never really said out loud to anyone?",c:"Personal"},
  {q:"What's something you're genuinely proud of that others might not know?",c:"Personal"},
  {q:"What does loneliness feel like for you — and what does it actually take for someone to break through that?",c:"Personal"},
  {q:"What are you most uncertain about in your life right now?",c:"Personal"},
  {q:"What's a part of yourself you find hardest to accept — and is it something you've ever let someone else fully see?",c:"Personal"},
  {q:"What do you most want someone to understand about who you are?",c:"Personal"},
  {q:"What's something small someone did that made you feel deeply cared for that they probably didn't even realize?",c:"Personal"},
  {q:"How do you know when you need space vs. when you need someone to stay — and have you ever asked for the wrong one?",c:"Personal"},
  {q:"What do you need from someone when you're going through something hard that most people get wrong when they try to help you?",c:"Personal"},
  {q:"For what in your life do you feel most grateful?",c:"Personal"},
  {q:"If you could wake up tomorrow having gained any one quality or ability, what would it be?",c:"Personal"},
  {q:"What roles do love and affection play in your life?",c:"Personal"},
  {q:"How close and warm is your family? Do you feel your childhood was happier than most other people's?",c:"Personal"},
  {q:"How do you feel about your relationship with your mother?",c:"Personal"},
  {q:"When did you last cry in front of another person? By yourself?",c:"Personal"},
  {q:"If you were to die this evening with no opportunity to communicate with anyone, what would you most regret not having told someone? Why haven't you told them yet?",c:"Personal"},
  {q:"Share a personal problem and ask your partner how they might handle it — then ask them to reflect back how you seem to be feeling about it.",c:"Personal"},
  {q:"What's a line you would never cross, no matter what?",c:"Values"},
  {q:"What do you believe God is calling you toward right now?",c:"Values"},
  {q:"What's something the world values that you're learning not to?",c:"Values"},
  {q:"What do you want people to say about you at the end of your life?",c:"Values"},
  {q:"What's a conviction you hold that most people around you don't share?",c:"Values"},
  {q:"How do you want to handle conflict in a relationship?",c:"Values"},
  {q:"What's something you want to build or create in your lifetime?",c:"Values"},
  {q:"What do you value most in a friendship?",c:"Values"},
  {q:"Is there something you've dreamed of doing for a long time? Why haven't you done it?",c:"Values"},
  {q:"If you were going to become a close friend with your partner, what would be important for them to know about you?",c:"Values"},
  {q:"What's your favourite memory from childhood?",c:"Light"},
  {q:"What's something you're secretly really good at?",c:"Light"},
  {q:"What does your perfect day look like from start to finish?",c:"Light"},
  {q:"What's something you've always wanted to try but haven't yet?",c:"Light"},
  {q:"What's the most spontaneous thing you've ever done?",c:"Light"},
  {q:"What's a movie, show, or book that genuinely changed how you see the world?",c:"Light"},
  {q:"If you could have dinner with anyone — living, dead, or fictional — who?",c:"Light"},
  {q:"What's something small you do that brings you joy that nobody knows about?",c:"Light"},
  {q:"What's your go-to comfort meal when you've had a rough day?",c:"Light"},
  {q:"What's the best gift you've ever received and why did it mean so much?",c:"Light"},
  {q:"Take four minutes and tell your partner your life story in as much detail as possible.",c:"Light"},
  {q:"Share an embarrassing moment in your life.",c:"Light"},
  {q:"Tell your partner what you like about them — be honest, saying things you might not normally say to someone you've just met.",c:"Light"},
];
const COLOR={Faith:"#C9963A",Personal:"#4A9A68",Values:"#B06840",Light:"#7AAE5A"};

/* ══════════════════ HELPERS ══════════════════ */
function shuffle(qs){
  const p={};
  qs.forEach(q=>{if(!p[q.c])p[q.c]=[];p[q.c].push({...q})});
  const keys=Object.keys(p),res=[];let s=0;
  while(keys.some(k=>p[k]?.length)&&s++<2000){
    const av=keys.filter(k=>p[k]?.length);
    const last=res.length?res[res.length-1].c:null;
    const pref=av.filter(k=>k!==last);
    const pool=pref.length?pref:av;
    const pick=pool[Math.floor(Math.random()*pool.length)];
    res.push(p[pick].splice(Math.floor(Math.random()*p[pick].length),1)[0]);
  }
  return res;
}
function loadRem(){try{return JSON.parse(localStorage.getItem("gt-rem")||"[]")}catch{return[]}}
function saveRem(segs){
  try{localStorage.setItem("gt-rem",JSON.stringify(ALL.filter(q=>!segs.some(s=>s.q===q.q)).map(q=>q.q)))}catch{}
}
function cloneTemplate(id){
  return document.getElementById(id).content.cloneNode(true);
}
function stamp(elId,tplId){
  const el=document.getElementById(elId);
  if(el)el.appendChild(cloneTemplate(tplId));
}

/* ══════════════════ STAMP CROSSES ══════════════════ */
stamp("orn-cross","tpl-sm");
stamp("div-cross","tpl-sm");
stamp("deck-cross","tpl-lg");
stamp("drawn-cross","tpl-lg");
/* card-cross is set dynamically per category in draw() */

const CAT_ICON={
  Faith:`<svg width="10" height="14" viewBox="0 0 10 14" fill="none">
    <rect x="3.5" y="0" width="3" height="14" rx="1" fill="#8B5E1A"/>
    <rect x="0" y="4" width="10" height="3" rx="1" fill="#8B5E1A"/>
  </svg>`,
  Personal:`<svg width="13" height="12" viewBox="0 0 13 12" fill="none">
    <path d="M6.5 11 C6.5 11 1 7.2 1 3.8 C1 2.2 2.2 1 3.7 1 C4.8 1 5.7 1.6 6.5 2.6 C7.3 1.6 8.2 1 9.3 1 C10.8 1 12 2.2 12 3.8 C12 7.2 6.5 11 6.5 11Z" fill="#8B5E1A" opacity=".85"/>
  </svg>`,
  Values:`<svg width="12" height="14" viewBox="0 0 12 14" fill="none">
    <path d="M6 1 L11 3.5 L11 7.5 C11 10.2 8.8 12.5 6 13 C3.2 12.5 1 10.2 1 7.5 L1 3.5 Z" fill="none" stroke="#8B5E1A" stroke-width="1.3" stroke-linejoin="round" opacity=".85"/>
  </svg>`,
  Light:``
};

/* ══════════════════ STATE ══════════════════ */
let segs=[],curQ=null,curIdx=null,hist=[],busy=false;

function init(){
  const rem=loadRem();
  segs=shuffle(ALL.filter(q=>!rem.includes(q.q)));
  renderLegend();updateCount();updateRestore();
}

/* ══════════════════ QUOTES ══════════════════ */
let qi=0;
const qWrap=document.getElementById("quote-wrap");
const qText=document.getElementById("quote-text");
const qRef=document.getElementById("quote-ref");
function showQ(){qText.textContent=`"${QUOTES[qi].text}"`;qRef.textContent=QUOTES[qi].ref;}
showQ();
setInterval(()=>{
  qWrap.classList.replace("in","out");
  setTimeout(()=>{qi=(qi+1)%QUOTES.length;showQ();qWrap.classList.replace("out","in");},660);
},15000);

/* ══════════════════ DOM REFS ══════════════════ */
const deck=document.getElementById("deck");
const deckCount=document.getElementById("deck-count");
const drawnCard=document.getElementById("drawn-card");
const cardInner=document.getElementById("card-inner");
const cardQ=document.getElementById("card-q");
const catPip=document.getElementById("cat-pip");
const catLabel=document.getElementById("cat-label");
const actionBtns=document.getElementById("action-buttons");
const restoreBtn=document.getElementById("restore-btn");

function updateCount(){
  deckCount.textContent=segs.length===0?"No questions remaining":`${segs.length} question${segs.length===1?"":"s"} remaining`;
}

/* ══════════════════ DRAW ══════════════════ */
deck.addEventListener("click",draw);
function draw(){
  if(!segs.length||busy)return;
  busy=true;
  const i=Math.floor(Math.random()*segs.length);
  curQ=segs[i];curIdx=i;
  cardQ.textContent=`"${curQ.q}"`;
  catPip.style.background=COLOR[curQ.c];
  catLabel.style.color=COLOR[curQ.c];
  catLabel.textContent=curQ.c;
  const iconEl=document.getElementById("card-cross");
  iconEl.innerHTML=CAT_ICON[curQ.c]||"";

  deck.classList.add("hide");
  deckCount.classList.add("hide");
  setTimeout(()=>{
    drawnCard.classList.add("show");
    requestAnimationFrame(()=>{
      drawnCard.classList.add("visible");
      setTimeout(()=>{
        cardInner.classList.add("flipped");
        setTimeout(()=>actionBtns.classList.add("show"),900);
      },160);
    });
  },260);
}

/* ══════════════════ KEEP / REMOVE ══════════════════ */
document.getElementById("keep-btn").addEventListener("click",()=>{
  addHist(curQ);returnCard();
});
document.getElementById("remove-btn").addEventListener("click",()=>{
  if(curIdx===null)return;
  addHist(curQ);
  segs.splice(curIdx,1);
  saveRem(segs);renderLegend();updateRestore();
  returnCard();
});
function returnCard(){
  actionBtns.classList.remove("show");
  setTimeout(()=>cardInner.classList.remove("flipped"),80);
  setTimeout(()=>drawnCard.classList.remove("visible"),600);
  setTimeout(()=>{
    drawnCard.classList.remove("show");
    curQ=null;curIdx=null;
    updateCount();
    deck.classList.remove("hide");
    deckCount.classList.remove("hide");
    if(!segs.length)deck.style.pointerEvents="none";
    busy=false;
  },970);
}

/* ══════════════════ RESTORE ══════════════════ */
restoreBtn.addEventListener("click",()=>{
  try{localStorage.removeItem("gt-rem")}catch{}
  segs=shuffle(ALL);hist=[];renderHist();
  deck.style.pointerEvents="";
  renderLegend();updateCount();updateRestore();
});
function updateRestore(){restoreBtn.style.display=segs.length<ALL.length?"block":"none";}

/* ══════════════════ LEGEND ══════════════════ */
const legendEl=document.getElementById("legend");
function renderLegend(){
  legendEl.innerHTML="";
  Object.entries(COLOR).forEach(([cat,col])=>{
    const rem=segs.filter(s=>s.c===cat).length;
    const d=document.createElement("div");d.className="li";
    d.innerHTML=`<div class="li-dot" style="background:${col};opacity:${rem?1:.25}"></div><span class="li-name" style="opacity:${rem?.8:.3}">${cat}</span><span class="li-count">(${rem})</span>`;
    legendEl.appendChild(d);
  });
}

/* ══════════════════ HISTORY ══════════════════ */
const histEl=document.getElementById("history");
function addHist(item){hist.unshift(item);if(hist.length>6)hist.pop();renderHist();}
function renderHist(){
  const vis=hist.slice(1);
  if(!vis.length){histEl.innerHTML="";return;}
  histEl.innerHTML=`<div id="history-label">Past Questions</div>`+
    vis.map(h=>`<div class="hi" style="border-left-color:${COLOR[h.c]}55"><span class="hi-cat" style="color:${COLOR[h.c]}">${h.c}</span>${h.q}</div>`).join("");
}

init();
</script>
</body>
</html>
